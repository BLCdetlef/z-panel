<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ZUSTAND – automatisch wechselndes News-Panel zu den planetaren Grenzen.">
  <title>ZUSTAND – News-Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="panel-shell">
    <header class="panel-header">
      <a class="brand" href="https://blcdetlef.github.io/z-panel/" aria-label="ZUSTAND Startseite">
        <span class="brand-mark">Z</span>
        <span>
          <strong>ZUSTAND</strong>
          <small>News-Panel</small>
        </span>
      </a>

      <div class="header-controls">
        <button id="pause-button" class="control-button" type="button" aria-pressed="false">
          <span class="control-icon" aria-hidden="true">⏸</span>
          <span class="control-label">Pause</span>
        </button>
      </div>
    </header>

    <section id="panel" class="news-panel" aria-live="polite">
      <div id="image-wrap" class="panel-image-wrap">
        <div id="boundary-badge" class="boundary-badge">–</div>
        <div id="image-placeholder" class="image-placeholder">Bild wird geladen …</div>
        <img id="article-image" class="panel-image" alt="" hidden>
      </div>

      <article class="panel-content">
        <div id="article-meta" class="article-meta">Meldungen werden geladen …</div>
        <h1 id="article-title">ZUSTAND</h1>
        <p id="article-summary" class="article-summary">
          Das News-Panel wird vorbereitet.
        </p>

        <div class="panel-actions">
          <button id="read-more-button" class="action-button primary" type="button">
            Mehr lesen
          </button>
          <button id="next-button" class="action-button secondary" type="button">
            Nächster Artikel →
          </button>
        </div>
      </article>
    </section>

    <footer class="panel-footer">
      <div class="counter-wrap">
        <span id="article-counter">0 / 0</span>
        <span id="countdown-label">Automatischer Wechsel in 00:30</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="keyboard-hint">
        ← zurück · Leertaste Pause · → weiter
      </div>
    </footer>
  </main>

  <dialog id="article-dialog">
    <article class="dialog-card">
      <button id="dialog-close" class="dialog-close" type="button" aria-label="Artikel schließen">×</button>
      <div id="dialog-content"></div>
    </article>
  </dialog>

  <script src="app.js" defer></script>
</body>
</html>
