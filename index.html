<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZUSTAND – News-Panel</title>
  <link rel="stylesheet" href="news.css">
</head>
<body>
  <main class="panel" aria-live="polite">
    <header class="panel-header">
      <div class="brand">
        <span class="brand-name">ZUSTAND</span>
        <span class="brand-subtitle">Nachrichten zu unseren Lebensgrundlagen</span>
      </div>
      <div class="counter" id="news-counter">1 / 1</div>
    </header>

    <section class="news-card" id="news-card">
      <div class="visual" id="news-visual" hidden>
        <img id="news-image" alt="">
      </div>

      <div class="content">
        <div class="meta">
          <span id="news-category">ZUSTAND</span>
          <span aria-hidden="true">·</span>
          <time id="news-date"></time>
        </div>

        <h1 id="news-title">Meldungen werden geladen …</h1>
        <p class="summary" id="news-summary"></p>
        <blockquote id="news-highlight" hidden></blockquote>

        <footer class="source">
          <span>Quelle:</span>
          <a id="news-source-link" target="_blank" rel="noopener noreferrer">
            <span id="news-source-name"></span>
          </a>
        </footer>
      </div>
    </section>

    <footer class="panel-footer">
      <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="footer-line">
        <span>Wissenschaftlich einordnen. Gemeinsam diskutieren.</span>
        <button id="pause-button" type="button">Pause</button>
      </div>
    </footer>

    <div class="error-message" id="error-message" hidden></div>
  </main>

  <script src="news.js" defer></script>
</body>
</html>
